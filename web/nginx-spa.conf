server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik varlıklar uzun cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: bilinmeyen yollar index.html'e (React Router client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
