# Artademi login teması — klasik "keycloak" login temasını EXTEND eder (parent), yalnızca
# görünümü CSS ile değiştirir. .ftl override YOK (sürüm-kırılganlığını azaltmak için logo da
# CSS background-image ile eklenir). styles: parent'ın login.css'i + bizim artademi.css (sonra
# yüklenir → override eder).
parent=keycloak
import=common/keycloak

styles=css/login.css css/artademi.css

# TR + EN locale; metinler Keycloak'ın hazır çevirilerinden gelir.
locales=tr,en
