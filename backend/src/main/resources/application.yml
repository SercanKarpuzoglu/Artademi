server:
  # Port da env'den okunur; varsayilan 8081 (Keycloak 8080'de kalsin).
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: artademi-backend

  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm issuer'i; jwk-set-uri bu issuer'dan otomatik kesfedilir.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/Artademi}

# Keycloak Admin REST API (service account) — kullanici yonetimi modulu (com.artademi.user).
# Sir KODA GOMULMEZ; admin-client-secret yalnizca ortam degiskeninden gelir (varsayilan YOK).
artademi:
  keycloak:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:Artademi}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:artademi-backend}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    # Kullanici parolasini dogrulamak icin kullanilan public client (Direct Access Grants).
    app-client-id: ${KEYCLOAK_APP_CLIENT_ID:artademi-app}

  datasource:
    # Baglanti bilgileri ortam degiskeninden gelir. Parola icin VARSAYILAN YOK.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/artademi}
    username: ${SPRING_DATASOURCE_USERNAME:artademi}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      # Semayi Flyway yonetir; Hibernate yalnizca dogrular.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

# Actuator: yalnizca health endpoint acik.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      access: read-only
